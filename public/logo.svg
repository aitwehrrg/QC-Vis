<svg width="64" height="64" viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect x="4" y="4" width="56" height="56" rx="8" stroke="#2d9f7f" stroke-width="2" fill="none"/>
  <!-- Lattice points (3x3 grid) -->
  <circle cx="16" cy="16" r="4" fill="#2d9f7f"/>
  <circle cx="32" cy="16" r="4" fill="#2d9f7f"/>
  <circle cx="48" cy="16" r="4" fill="#2d9f7f"/>
  <circle cx="16" cy="32" r="4" fill="#2d9f7f"/>
  <circle cx="32" cy="32" r="5" fill="#2d9f7f"/>
  <circle cx="48" cy="32" r="4" fill="#2d9f7f"/>
  <circle cx="16" cy="48" r="4" fill="#2d9f7f"/>
  <circle cx="32" cy="48" r="4" fill="#2d9f7f"/>
  <circle cx="48" cy="48" r="4" fill="#2d9f7f"/>
  <!-- Diagonal connections suggesting lattice structure -->
  <line x1="16" y1="16" x2="32" y2="32" stroke="#2d9f7f" stroke-width="1" opacity="0.4"/>
  <line x1="48" y1="16" x2="32" y2="32" stroke="#2d9f7f" stroke-width="1" opacity="0.4"/>
  <line x1="16" y1="48" x2="32" y2="32" stroke="#2d9f7f" stroke-width="1" opacity="0.4"/>
  <line x1="48" y1="48" x2="32" y2="32" stroke="#2d9f7f" stroke-width="1" opacity="0.4"/>
  <!-- Cross connections -->
  <line x1="16" y1="16" x2="48" y2="48" stroke="#2d9f7f" stroke-width="0.5" opacity="0.2"/>
  <line x1="48" y1="16" x2="16" y2="48" stroke="#2d9f7f" stroke-width="0.5" opacity="0.2"/>
</svg>
